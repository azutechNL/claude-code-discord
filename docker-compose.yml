# Claude Code Discord Bot - Docker Compose Configuration
# Quick start: docker compose up -d
#
# IMPORTANT: The ANTHROPIC_API_KEY in your .env file is required for Docker.
# The Claude CLI inside the container uses it to authenticate with Anthropic.
# (Unlike native installs, you cannot run `claude /login` inside the container.)
#
# To use the pre-built image from GitHub Container Registry (recommended):
#   1. Comment out the 'build' section below
#   2. Uncomment the 'image' line
#   3. Run: docker compose pull && docker compose up -d

services:
  claude-bot:
    # Option A: Build locally from source (default)
    build:
      context: .
      dockerfile: Dockerfile
    # Option B: Use pre-built image from GHCR (uncomment and remove build above)
    # image: ghcr.io/zebbern/claude-code-discord:latest
    container_name: claude-code-discord
    restart: unless-stopped

    # Environment variables (use .env file or set here)
    # Authentication (choose one):
    #   Option A: Set ANTHROPIC_API_KEY in your .env file (simplest)
    #   Option B: Run `docker exec -it claude-code-discord claude /login` after starting
    #             (credentials persist in the claude-config volume)
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - APPLICATION_ID=${APPLICATION_ID}
      # ANTHROPIC_API_KEY intentionally omitted — using OAuth (Claude Pro/Max).
      # After `docker compose up -d`, run:
      #   docker exec -it claude-code-discord claude /login
      # OAuth tokens persist in the claude-config volume. To use API key
      # instead, uncomment the line below and set ANTHROPIC_API_KEY in .env.
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORK_DIR=${WORK_DIR:-/app/workspace}
      - USER_ID=${USER_ID:-}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS:-}
      - ADMIN_ROLE_IDS=${ADMIN_ROLE_IDS:-}
      - ALLOWED_CHANNEL_IDS=${ALLOWED_CHANNEL_IDS:-}
      - CATEGORY_NAME=${CATEGORY_NAME:-claude-code}
      - MONITOR_CHANNEL_ID=${MONITOR_CHANNEL_ID:-}
      - MONITOR_BOT_IDS=${MONITOR_BOT_IDS:-}
      - OPENCLAW_BRIDGE_URL=${OPENCLAW_BRIDGE_URL:-http://host.docker.internal:8901}
      - OPENCLAW_BRIDGE_TOKEN=${OPENCLAW_BRIDGE_TOKEN:-}
      - HONCHO_API_URL=${HONCHO_API_URL:-http://honcho-api:8000}
      - HONCHO_WORKSPACE_ID=${HONCHO_WORKSPACE_ID:-discord-bot}

    # Volume mounts for persistence and workspace access
    volumes:
      # Persist bot data (todos, sessions, etc.)
      - bot-data:/app/.bot-data
      - claude-config:/home/claude/.claude
      # Host projects workspace — unbound channels see all projects here.
      # Channels can /bind <folder> to narrow scope to one project subdir.
      - /home/karim/projects:/workspaces/projects:rw
      # Beads (bd) CLI — bind-mount host binaries + container-aware wrapper
      # so each Claude session can manage per-project .beads/ databases.
      - /home/karim/bin/dolt:/usr/local/bin/dolt:ro
      - /home/karim/.local/bin/bd.bin:/usr/local/bin/bd.bin:ro
      - ./scripts/bd-container.sh:/usr/local/bin/bd:ro

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Security options
    security_opt:
      - no-new-privileges:true

    # Network mode
    networks:
      - claude-network

    # Allow reaching services running on the host (e.g. OpenClaw bridge at :8901)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ────────────────────────────────────────────────────────────────────
  # Optional: Claude Code monitoring dashboards (sidecars).
  # The bot's hook-forwarder POSTs events to both on the claude-network.
  # Access the UIs at:
  #   http://localhost:4820  (Claude-Code-Agent-Monitor, hoangsonww)
  #   http://localhost:4981  (agents-observe, simple10)
  # ────────────────────────────────────────────────────────────────────

  agent-monitor:
    build:
      context: https://github.com/hoangsonww/Claude-Code-Agent-Monitor.git
    container_name: agent-monitor
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DASHBOARD_PORT=4820
      - DASHBOARD_DB_PATH=/app/data/dashboard.db
    volumes:
      - agent-monitor-data:/app/data
    ports:
      - "4820:4820"
    networks:
      - claude-network

  agents-observe:
    image: ghcr.io/simple10/agents-observe:v0.7.4
    container_name: agents-observe
    restart: unless-stopped
    environment:
      - AGENTS_OBSERVE_SERVER_PORT=4981
      - AGENTS_OBSERVE_DB_PATH=/data/observe.db
      - AGENTS_OBSERVE_CLIENT_DIST_PATH=/app/client/dist
      # Runtime=local disables the idle auto-shutdown (docker mode shuts down
      # after 60s if no WS clients / consumers are connected).
      - AGENTS_OBSERVE_RUNTIME=local
      - AGENTS_OBSERVE_STORAGE_ADAPTER=sqlite
      - AGENTS_OBSERVE_LOG_LEVEL=info
    volumes:
      - agents-observe-data:/data
    ports:
      - "4981:4981"
    networks:
      - claude-network

  # ────────────────────────────────────────────────────────────────────
  # Honcho — self-hosted user context + personality memory layer.
  # API: http://honcho-api:8000 (internal), http://localhost:8000 (host)
  # Deriver + Dreamer run as a background worker processing message queue.
  # LLM: MiniMax M2.7 via OpenAI-compatible endpoint.
  # ────────────────────────────────────────────────────────────────────

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: honcho-db
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - /home/karim/honcho/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - honcho-pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - claude-network

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    restart: unless-stopped
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - claude-network

  honcho-api:
    build:
      context: /home/karim/honcho
      dockerfile: Dockerfile
    container_name: honcho-api
    entrypoint: ["sh", "docker/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:postgres@honcho-db:5432/postgres
      - CACHE_URL=redis://honcho-redis:6379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - /home/karim/honcho/.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - claude-network

  honcho-deriver:
    build:
      context: /home/karim/honcho
      dockerfile: Dockerfile
    container_name: honcho-deriver
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    restart: unless-stopped
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:postgres@honcho-db:5432/postgres
      - CACHE_URL=redis://honcho-redis:6379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - /home/karim/honcho/.env
    networks:
      - claude-network

# Named volumes for data persistence
volumes:
  bot-data:
    driver: local
  claude-config:
    driver: local
  agent-monitor-data:
    driver: local
  agents-observe-data:
    driver: local
  honcho-pgdata:
    driver: local
  honcho-redis-data:
    driver: local

# Network configuration
networks:
  claude-network:
    driver: bridge
